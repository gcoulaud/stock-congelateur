<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Congelateur</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <div class="app-brand">
          <img src="glace.png" alt="Logo glace" class="app-logo" />
          <h1>
            <span>Stock</span>
            <span></span>
          </h1>
        </div>
        <p id="sync-status" class="hint"></p>
      </header>

      <section class="card">
        <h2>Ajouter un produit</h2>
        <p class="hint">Le produit sera ajoute dans l'onglet actif.</p>
        <form id="product-form" class="form-row product-form" autocomplete="on">
          <div class="autocomplete-box">
            <input
              id="product-name"
              name="product_input"
              type="text"
              placeholder="Ex: Haricots verts"
              required
              maxlength="80"
              autocomplete="on"
              autocorrect="on"
              autocapitalize="sentences"
              spellcheck="true"
            />
            <ul id="product-suggestions" class="suggestions-list" hidden></ul>
          </div>
          <div class="product-form-actions">
            <input id="product-qty" type="number" min="1" step="1" value="1" required />
            <select id="product-category" aria-label="Categorie du produit"></select>
            <button type="submit">Ajouter</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Produits en stock</h2>

        <div id="freezer-tabs" class="tabs" role="tablist" aria-label="Congelateurs"></div>
        <div id="freezer-panels"></div>
      </section>

      <section class="card">
        <h2>QR code d'acces</h2>
        <p>Renseigne l'URL publique de l'app puis scanne le QR code.</p>
        <div class="form-row">
          <input id="app-url" type="url" placeholder="https://mon-app.exemple.com" />
          <button id="generate-qr" type="button">Generer QR</button>
        </div>
        <div class="qr-wrapper">
          <img id="qr-image" alt="QR code" />
        </div>
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
